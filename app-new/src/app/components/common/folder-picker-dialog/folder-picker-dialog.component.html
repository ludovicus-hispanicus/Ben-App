<mat-dialog-content class="folder-picker-content">
  <div class="top-bar">
    <h2>{{ data?.title || 'Choose Folder' }}</h2>
    <span class="spacer"></span>
    <button mat-button (click)="onCancel()">Cancel</button>
  </div>

  <!-- Create new folder -->
  <div class="create-folder-row">
    <mat-form-field appearance="outline" class="folder-name-field">
      <mat-label>New folder name</mat-label>
      <input matInput [(ngModel)]="newFolderName" (keyup.enter)="createFolder()"
             placeholder="Enter folder name...">
    </mat-form-field>
    <button mat-raised-button color="primary" (click)="createFolder()"
            [disabled]="!newFolderName.trim() || isCreating">
      <mat-icon>create_new_folder</mat-icon>
      Create & Save
    </button>
    <mat-spinner *ngIf="isCreating" diameter="24"></mat-spinner>
  </div>

  <div class="divider-row">
    <mat-divider></mat-divider>
    <span class="divider-label">or select existing</span>
    <mat-divider></mat-divider>
  </div>

  <!-- Folder tree -->
  <div class="scrollable-area">
    <div *ngIf="isLoading" class="loading">
      <mat-spinner diameter="30"></mat-spinner>
    </div>

    <div *ngIf="!isLoading && flatFolders.length === 0" class="empty">
      No folders found. Create one above.
    </div>

    <div *ngFor="let folder of flatFolders"
         class="folder-row"
         [class.selected]="isSelected(folder)"
         [style.padding-left.px]="12 + folder.depth * 20"
         (click)="selectProject(folder)">
      <span *ngIf="folder.hasChildren"
            class="expand-arrow"
            [class.expanded]="folder.expanded"
            (click)="toggleExpand(folder, $event)">&#9654;</span>
      <span *ngIf="!folder.hasChildren" class="expand-spacer"></span>
      <mat-icon class="folder-icon">{{ folder.expanded && folder.hasChildren ? 'folder_open' : 'folder' }}</mat-icon>
      <span class="folder-name">{{ folder.name }}</span>
      <span class="folder-count">{{ folder.total_image_count }} pages</span>
      <mat-icon class="check-icon" *ngIf="isSelected(folder)">check_circle</mat-icon>
    </div>
  </div>

  <!-- Confirm bar -->
  <div class="confirm-bar" *ngIf="selectedProjectId">
    <button mat-flat-button color="primary" (click)="confirm()">
      Save to Selected Folder
    </button>
  </div>
</mat-dialog-content>
