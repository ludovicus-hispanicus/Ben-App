<h2 mat-dialog-title>
  <mat-icon>label</mat-icon>
  Set Labels
</h2>

<mat-dialog-content>
  <!-- Selected labels -->
  <div class="selected-labels" *ngIf="selectedLabels.length > 0">
    <p class="section-title">Selected:</p>
    <div class="label-chips">
      <span class="label-chip selected" *ngFor="let label of selectedLabels"
            (click)="removeLabel(label)">
        {{ label }}
        <mat-icon class="remove-icon">close</mat-icon>
      </span>
    </div>
  </div>

  <!-- Add new label -->
  <div class="label-input-section">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Add label</mat-label>
      <input matInput [(ngModel)]="labelInput" placeholder="Type a new label"
             (keydown.enter)="addCustomLabel()">
      <button mat-icon-button matSuffix (click)="addCustomLabel()" *ngIf="labelInput.trim()">
        <mat-icon>add</mat-icon>
      </button>
    </mat-form-field>
  </div>

  <!-- Existing labels to pick from -->
  <div class="existing-labels" *ngIf="data.existingLabels && data.existingLabels.length > 0">
    <p class="section-title">Available labels:</p>
    <div class="label-chips">
      <button
        *ngFor="let label of data.existingLabels"
        mat-stroked-button
        [class.selected]="isSelected(label)"
        (click)="toggleLabel(label)"
        class="label-chip">
        {{ label }}
      </button>
    </div>
  </div>

  <div class="clear-section" *ngIf="selectedLabels.length > 0">
    <button mat-button color="warn" (click)="clearLabels()">
      <mat-icon>clear</mat-icon>
      Remove all labels
    </button>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="onSave()">Save</button>
</mat-dialog-actions>
