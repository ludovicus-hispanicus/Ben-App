<div class="confirm-dialog">
  <h2 mat-dialog-title>
    <mat-icon [class.warn-icon]="data.warn">{{ data.warn ? 'warning' : 'help_outline' }}</mat-icon>
    {{ data.title }}
  </h2>

  <mat-dialog-content>
    <p>{{ data.message }}</p>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-stroked-button (click)="onCancel()">{{ data.cancelText }}</button>
    <button mat-flat-button [color]="data.warn ? 'warn' : 'primary'" (click)="onConfirm()">
      {{ data.confirmText }}
    </button>
  </mat-dialog-actions>
</div>
