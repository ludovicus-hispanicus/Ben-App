<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>CuReD - Dictionary Curation</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .loader {
            border: 5px solid #333;
            border-top: 5px solid #0078d4;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        h2 {
            font-weight: 300;
            letter-spacing: 1px;
        }

        #status {
            color: #aaa;
            font-size: 0.9em;
            margin-top: 10px;
        }

        .info {
            font-size: 0.8em;
            color: #666;
            margin-top: 30px;
            text-align: center;
        }

        #log-container {
            margin-top: 20px;
            width: 80%;
            max-width: 700px;
            max-height: 200px;
            overflow-y: auto;
            background: #111;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 10px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 0.75em;
            color: #8f8;
            text-align: left;
            white-space: pre-wrap;
            word-break: break-all;
        }
    </style>
</head>

<body>
    <div class="loader"></div>
    <h2>Starting CuReD...</h2>
    <p id="status">Initializing services...</p>
    <p class="info">
        Starting backend server and frontend application.<br>
        Checking for Ollama VLM support...
    </p>
    <div id="log-container"></div>
    <script>
        const statusElement = document.getElementById('status');
        const logContainer = document.getElementById('log-container');

        window.electronAPI.onStatusUpdate((status) => {
            statusElement.innerText = status;
        });

        window.electronAPI.onLogAppend((message) => {
            const line = document.createElement('div');
            line.textContent = message;
            logContainer.appendChild(line);
            logContainer.scrollTop = logContainer.scrollHeight;
        });
    </script>
</body>

</html>
