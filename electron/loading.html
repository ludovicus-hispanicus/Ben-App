<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>BEn App</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .loader {
            border: 5px solid #333;
            border-top: 5px solid #0078d4;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        h2 {
            font-weight: 300;
            letter-spacing: 1px;
        }

        p {
            color: #aaa;
            font-size: 0.9em;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div class="loader"></div>
    <h2>Starting Services...</h2>
    <p>Please wait while we initialize the Docker containers.</p>
    <p style="font-size: 0.8em; color: #666; margin-top: 30px;">
        * Note: If this is your first time installing, you may be prompted to restart your computer.
    </p>
    <script>
        const statusElement = document.querySelector('p');

        window.electronAPI.onStatusUpdate((status) => {
            statusElement.innerText = status;
        });
    </script>
</body>

</html>
