services:
  # server - FastAPI Python backend
  server:
    image: vaziman/server:latest
    container_name: server
    ports:
      - 5001:5001
    networks:
      - backend
    volumes:
      - server-storage:/data/server-storage
      - yolo-data:/data/yolo
    environment:
      APP_ENV: prod
      APP_DEBUG: "False"
      APP_PORT: 5001
      MONGODB_DATABASE: flaskdb
      MONGODB_USERNAME: mongodbuser
      MONGODB_PASSWORD: your_mongodb_root_password
      MONGODB_HOSTNAME: mongodb://mongodb:27017/
      TRANSLATOR_URL: http://translator:5002/api/v1
      STORAGE_PATH: /data/server-storage
      SECRET: 2c4fc4e6be22853fec33a243a9327e307dc56f0964d2e89e
      ALGORITHM: HS256
      USE_DETECTRON: "True"
      LOG_LEVEL: DEBUG
      VLM_OCR_URL: http://vlm-ocr:5003  # Ollama LLaVA service
      YOLO_DATA_PATH: /data/yolo  # YOLO training data storage
    shm_size: '2gb'
    deploy:
      restart_policy:
        condition: on-failure
    depends_on:
      - mongodb
      # - translator  # Disabled until new model available
      # - vlm-ocr  # Uncomment when GPU available

  # translator - FastAPI Akkadian service
  # DISABLED: Removed for now due to Python 3.7 + akkadian dependency conflicts
  # Re-enable when a new transliteration model is available
  # translator:
  #   build:
  #     context: ../translator/
  #   container_name: translator
  #   ports:
  #     - 5002:5002
  #   networks:
  #     - backend
  #   deploy:
  #     restart_policy:
  #       condition: on-failure

  # app - Angular frontend
  app:
    build:
      context: ../app/
    container_name: app
    ports:
      - 8081:80
    restart: on-failure
    networks:
      - backend

  # database - MongoDB
  mongodb:
    image: mongo:4.4.6
    command: mongod --auth
    networks:
      - backend
    ports:
      - "27018:27017"  # Use 27018 to avoid conflicts with existing MongoDB
    volumes:
      - mongodata:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongodbuser
      MONGO_INITDB_ROOT_PASSWORD: your_mongodb_root_password
      MONGO_INITDB_DATABASE: flaskdb
      MONGODB_DATA_DIR: /data/db
      MONDODB_LOG_DIR: /dev/null

  # vlm-ocr - Ollama LLaVA service for Dictionary OCR (Beta)
  # Requires NVIDIA GPU with 8GB VRAM (uses llava:13b for better OCR accuracy)
  # Uncomment to enable when GPU is available
  # vlm-ocr:
  #   build:
  #     context: ../vlm-ocr/
  #   container_name: vlm-ocr
  #   ports:
  #     - 5003:5003
  #   networks:
  #     - backend
  #   volumes:
  #     - vlm-models:/root/.ollama/models
  #   environment:
  #     - OLLAMA_HOST=0.0.0.0:5003
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  #     restart_policy:
  #       condition: on-failure
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:5003/api/tags"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 5
  #     start_period: 120s  # Give time for model download on first run

networks:
  backend:
    driver: bridge

volumes:
  mongodata:
    driver: local
  server-storage:
    driver: local
  vlm-models:  # Cache for Ollama LLaVA model weights
    driver: local
  yolo-data:  # YOLO training datasets, models, and jobs
    driver: local
