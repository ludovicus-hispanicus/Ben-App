<h2 mat-dialog-title>PDF Page Range</h2>
<mat-dialog-content>
  <p class="pdf-info">
    <mat-icon>picture_as_pdf</mat-icon>
    <strong>{{ data.filename }}</strong> &mdash; {{ data.pageCount }} pages
  </p>

  <div class="range-row">
    <mat-form-field appearance="outline" class="range-field">
      <mat-label>From page</mat-label>
      <input matInput type="number" [(ngModel)]="pageFrom"
             [min]="1" [max]="data.pageCount" placeholder="1">
    </mat-form-field>

    <span class="range-separator">to</span>

    <mat-form-field appearance="outline" class="range-field">
      <mat-label>To page</mat-label>
      <input matInput type="number" [(ngModel)]="pageTo"
             [min]="pageFrom || 1" [max]="data.pageCount" [placeholder]="'' + data.pageCount">
    </mat-form-field>
  </div>

  <p class="extract-info" *ngIf="pageFrom || pageTo">
    Will extract {{ extractCount }} page(s)
  </p>

  <mat-form-field appearance="outline" class="dpi-field">
    <mat-label>Resolution</mat-label>
    <mat-select [(ngModel)]="dpi">
      <mat-option *ngFor="let opt of dpiOptions" [value]="opt.value">{{ opt.label }}</mat-option>
    </mat-select>
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-stroked-button (click)="onExtractAll()">
    <mat-icon>select_all</mat-icon> All Pages
  </button>
  <button mat-raised-button color="primary" (click)="onExtractRange()"
          [disabled]="pageFrom != null && pageTo != null && pageFrom > pageTo">
    <mat-icon>content_cut</mat-icon>
    {{ (pageFrom || pageTo) ? 'Extract Range' : 'All Pages' }}
  </button>
</mat-dialog-actions>
