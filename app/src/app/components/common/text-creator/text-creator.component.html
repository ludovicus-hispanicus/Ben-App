<mat-card cdkFocusInitial>
    <mat-card-header>
      <mat-card-title>Find / Create a text</mat-card-title>
    </mat-card-header>

    <mat-card-content>

        <mat-stepper [linear]="true" #stepper>
            <mat-step *ngIf="showFindText" class="a-container">
                <ng-template matStepLabel>Find text</ng-template>
                <text-selector [isDialog]="false" [showCreateOnNoResult]="showCreateOnNoResult" (selectedTextId)="selectedText($event)" style="padding: 1em;"></text-selector>
            </mat-step>
            <mat-step *ngIf="selectTransliteration" label="Fill out your address">
                <ng-template matStepLabel>Select transliteration</ng-template>
                <table mat-table [dataSource]="transliterations" class="mat-elevation-z8" style="width: 60em;">
                    <ng-container matColumnDef="select">
                        <th mat-header-cell *matHeaderCellDef>
                            
                          </th>
                          <td mat-cell *matCellDef="let row">
                            <button mat-stroked-button (click)="transliterationSelected(row)"> Select</button>
                          </td>
                    </ng-container>

                    <ng-container matColumnDef="uploader_id">
                      <th mat-header-cell *matHeaderCellDef> Uploader id</th>
                      <td mat-cell *matCellDef="let element"> {{element.uploader_id}} </td>
                    </ng-container>
                  
                    <ng-container matColumnDef="last_edited">
                      <th mat-header-cell *matHeaderCellDef> Last edited </th>
                      <td mat-cell *matCellDef="let element"> {{element.last_edited | date:'medium'}} </td>
                    </ng-container>

                    <ng-container matColumnDef="image_name">
                        <th mat-header-cell *matHeaderCellDef> Image preview </th>
                        <td mat-cell *matCellDef="let row"> 
                            <button mat-stroked-button (click)="showImage(row)">Show Image</button>   
                        </td>
                    </ng-container>
                    
                    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
                  </table>
            </mat-step>
            
            <!-- <mat-step label="Fill out your address">
                <ng-template matStepLabel>Metadata</ng-template>
                Add some metadata...
                <button mat-stroked-button matStepperNext class="search-button">Next</button>
            </mat-step> -->
<!--   
            <mat-step>
                <ng-template matStepLabel>Create a text</ng-template>
                <p>Click here to submit for text {{textId}}.</p>
                <p style="font-size: smaller;">*Note - we'll save your text image for AI training purposes.</p>
                <button mat-stroked-button matStepperNext class="search-button" (click)="submit()">Submit</button>
            </mat-step> -->
        </mat-stepper>
        
    </mat-card-content>

  </mat-card>
