<h2 mat-dialog-title>
  <mat-icon>label</mat-icon>
  Set Label
</h2>

<mat-dialog-content>
  <div class="label-input-section">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Label name</mat-label>
      <input matInput [(ngModel)]="labelInput" placeholder="Enter a new label or select below">
    </mat-form-field>
  </div>

  <div class="existing-labels" *ngIf="data.existingLabels && data.existingLabels.length > 0">
    <p class="section-title">Existing labels:</p>
    <div class="label-chips">
      <button
        *ngFor="let label of data.existingLabels"
        mat-stroked-button
        [class.selected]="labelInput === label"
        (click)="selectLabel(label)"
        class="label-chip">
        {{ label }}
      </button>
    </div>
  </div>

  <div class="clear-section" *ngIf="data.currentLabel">
    <button mat-button color="warn" (click)="clearLabel()">
      <mat-icon>clear</mat-icon>
      Remove label
    </button>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="onSave()">Save</button>
</mat-dialog-actions>
