<form class="example-form" autofocus>
    <mat-form-field class="example-full-width" appearance="fill" [style.width]="width">
      <mat-label>{{hint}}</mat-label>
      <input matInput
             aria-label="State"
             [matAutocomplete]="auto"
             [formControl]="stateCtrl">
      <mat-autocomplete  #auto="matAutocomplete">
        <mat-option *ngFor="let state of (filteredStates | async);" (click)="selectionChanged(state)" [value]="state.value">
          <div matTooltip="{{state.value}}" matTooltipHideDelay="0" matTooltipPosition="right">
            <span>{{state.value}}</span>
            <small *ngIf="state.label"><span style="font-size: x-large;"  [style.fontFamily]="getFont()"> | {{state.label}}</span></small>
          </div>
        </mat-option>
      </mat-autocomplete>
    </mat-form-field>
</form>
