<div class="dialog-header">
  <div class="header-left">
    <span class="ben-label">BEN ID:</span>
    <span class="ben-id" *ngIf="data.textId">{{ data.textId }}</span>
    <span class="ben-id new" *ngIf="!data.textId">New</span>
  </div>
  <button mat-icon-button (click)="onSave()" class="save-btn" matTooltip="Save">
    <mat-icon>save</mat-icon>
  </button>
</div>

<div class="divider"></div>

<mat-dialog-content>
  <!-- Number fields with tag buttons -->
  <div class="field-row">
    <mat-form-field appearance="outline" class="field-input">
      <mat-label>Museum Number</mat-label>
      <input matInput [formControl]="museumNumberControl" placeholder="Enter museum number">
    </mat-form-field>
    <button mat-icon-button
            (click)="useAsLabel('museum')"
            [class.active]="activeLabel === 'museum'"
            matTooltip="Use as label">
      <mat-icon>label</mat-icon>
    </button>
  </div>

  <div class="field-row">
    <mat-form-field appearance="outline" class="field-input">
      <mat-label>P-Number</mat-label>
      <input matInput [formControl]="pNumberControl" placeholder="Enter P-number">
    </mat-form-field>
    <button mat-icon-button
            (click)="useAsLabel('pnumber')"
            [class.active]="activeLabel === 'pnumber'"
            matTooltip="Use as label">
      <mat-icon>label</mat-icon>
    </button>
  </div>

  <div class="field-row">
    <mat-form-field appearance="outline" class="field-input">
      <mat-label>Publication Number</mat-label>
      <input matInput [formControl]="publicationNumberControl" placeholder="Enter publication number">
    </mat-form-field>
    <button mat-icon-button
            (click)="useAsLabel('publication')"
            [class.active]="activeLabel === 'publication'"
            matTooltip="Use as label">
      <mat-icon>label</mat-icon>
    </button>
  </div>

  <div class="field-row">
    <mat-form-field appearance="outline" class="field-input">
      <mat-label>Other label</mat-label>
      <input matInput
             [formControl]="otherLabelControl"
             [matAutocomplete]="autoLabel"
             placeholder="Type or select existing label">
      <mat-autocomplete #autoLabel="matAutocomplete">
        <mat-option *ngFor="let label of filteredLabels | async" [value]="label">
          {{ label }}
        </mat-option>
      </mat-autocomplete>
    </mat-form-field>
    <button mat-icon-button
            (click)="useAsLabel('other')"
            [class.active]="activeLabel === 'other'"
            matTooltip="Use as label">
      <mat-icon>label</mat-icon>
    </button>
  </div>

  <div class="divider inner"></div>

  <!-- Part field -->
  <div class="field-row part-row">
    <mat-form-field appearance="outline" class="field-input">
      <mat-label>Part</mat-label>
      <input matInput [(ngModel)]="partInput" placeholder="e.g., Obverse, Reverse, 1/3">
    </mat-form-field>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-stroked-button (click)="onCancel()" class="cancel-btn">Cancel</button>
</mat-dialog-actions>
