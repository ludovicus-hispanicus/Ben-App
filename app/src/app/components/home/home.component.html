<!-- Desktop app - no login required -->
<div style="display: flex; flex-direction: column; align-items: center; padding: 10vw;">
    <h1>
        Welcome to Babylonian Engine
    </h1>
    <img src="../assets/img/BEn_logo2.png" height="200" class="d-inline-block align-top" alt="" style="border-radius: 7%; margin-top: 2vw; margin-bottom: 2vw;">
    <div class="instructions" style="margin-top: 2vw; display: flex; gap: 2em;">
        <button (click)="goToNewProject()" mat-raised-button color="primary" style="padding: 1em 2em; font-size: 1.2em;">
            New Project
        </button>
        <button (click)="goToDashboard()" mat-stroked-button style="padding: 1em 2em; font-size: 1.2em;">
            My Work
        </button>
    </div>
</div>
